<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" href="apple-touch-icon.png">

<meta name="apple-mobile-web-app-title" content="East Coast">

<style>
:root{
  --ocean:#123a4e; --tide:#1e7e8c; --sand:#f6f1e7; --shell:#fffdf8;
  --lobster:#d64541; --kelp:#33544a; --ink:#22333b; --mist:#8ba4ae;
  --line:#e3dccd;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--sand);color:var(--ink);min-height:100vh;padding-bottom:110px}
header{background:var(--ocean);color:var(--shell);padding:20px 18px 14px}
header h1{font-size:19px;font-weight:800;letter-spacing:.3px}
header .sub{font-size:12px;color:#a8c4cf;margin-top:3px;letter-spacing:.5px;text-transform:uppercase}
.wave{height:10px;background:radial-gradient(circle at 10px -4px, transparent 10px, var(--ocean) 11px);background-size:22px 14px;background-repeat:repeat-x;transform:rotate(180deg);margin-top:-1px}

/* tabs */
nav{position:sticky;top:0;background:var(--shell);border-bottom:1px solid var(--line);display:flex;z-index:50;box-shadow:0 2px 8px rgba(18,58,78,.08)}
nav button{flex:1;padding:12px 2px 10px;background:none;border:none;font-size:11px;font-weight:600;color:var(--mist);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
nav button.active{color:var(--tide)}
nav button .ic{font-size:20px;line-height:1}
main{padding:16px 14px;max-width:640px;margin:0 auto}
.hidden{display:none!important}

/* cards */
.card{background:var(--shell);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--tide);margin:18px 0 8px 2px}

/* itinerary */
.day-head{display:flex;justify-content:space-between;align-items:baseline;cursor:pointer}
.day-head h2{font-size:15px;font-weight:800;color:var(--ocean)}
.day-head .date{font-size:12px;color:var(--mist);font-weight:600}
.day-body{margin-top:10px;display:none}
.card.open .day-body{display:block}
.stop{display:flex;gap:10px;padding:7px 0;border-top:1px dashed var(--line);align-items:flex-start}
.stop:first-child{border-top:none}
.stop .t{font-size:11.5px;font-weight:700;color:var(--tide);min-width:88px;flex-shrink:0;padding-top:1px}
.stop .a{font-size:13.5px;line-height:1.4}
.stop .a .n{display:block;font-size:12px;color:var(--mist);margin-top:1px}
.chev{color:var(--mist);font-size:12px;transition:transform .15s}
.card.open .chev{transform:rotate(90deg)}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--tide);color:#fff;margin-left:6px;vertical-align:1px}
.badge.camp{background:var(--kelp)}
.badge.long{background:var(--lobster)}
.addr{display:inline-flex;align-items:center;gap:6px;margin-top:4px;background:#eef4f5;border:1px solid #d3e2e5;border-radius:20px;padding:3px 10px;font-size:11.5px;font-weight:600;color:var(--tide)}
.addr a{color:var(--tide);text-decoration:none}
.vg{font-size:12.5px;line-height:1.5;color:var(--ink)}
.vg b{color:var(--ocean)}
.vtag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:12px;margin:8px 0 4px}
.vtag.story{background:#eef4f5;color:var(--tide)}
.vtag.broll{background:#f0ede4;color:#8a7a3d}
.vtag.talk{background:#fdeceb;color:var(--lobster)}
.vtag.drone{background:#e9f0ec;color:var(--kelp)}
.vlist{font-size:12.5px;line-height:1.6;color:var(--ink);margin:0 0 2px 2px}
.addr button{background:none;border:none;color:var(--mist);cursor:pointer;font-size:12px;padding:0 0 0 2px}


/* expenses */
.totals{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.tot{background:var(--ocean);color:var(--shell);border-radius:14px;padding:13px}
.tot.alt{background:var(--tide)}
.tot .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#a8c4cf}
.tot .val{font-size:21px;font-weight:800;margin-top:2px}
.exp-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:9px 0;border-top:1px dashed var(--line)}
.exp-row:first-of-type{border-top:none}
.exp-row .info{flex:1;min-width:0}
.exp-row .name{font-size:13.5px;font-weight:600}
.exp-row .meta{font-size:11.5px;color:var(--mist);margin-top:1px}
.exp-row .amt{font-size:14px;font-weight:800;color:var(--ocean);white-space:nowrap}
.exp-row .amt .pp{display:block;font-size:10.5px;font-weight:600;color:var(--mist);text-align:right}
.exp-row button.del{background:none;border:none;color:var(--mist);font-size:15px;cursor:pointer;padding:2px 4px}
.subtot{display:flex;justify-content:space-between;padding:8px 0 2px;font-size:12.5px;font-weight:800;color:var(--kelp);border-top:2px solid var(--line);margin-top:4px}
.settle{font-size:13px;line-height:1.6}
.settle b{color:var(--ocean)}

/* forms */
.fab{position:fixed;bottom:96px;right:18px;width:56px;height:56px;border-radius:50%;background:var(--lobster);color:#fff;font-size:28px;border:none;box-shadow:0 4px 14px rgba(214,69,65,.4);cursor:pointer;z-index:40;display:flex;align-items:center;justify-content:center;padding-bottom:3px}
.overlay{position:fixed;inset:0;background:rgba(18,58,78,.55);z-index:60;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--shell);border-radius:18px 18px 0 0;width:100%;max-width:640px;padding:20px 18px 26px;max-height:88vh;overflow-y:auto}
.sheet h3{font-size:16px;font-weight:800;color:var(--ocean);margin-bottom:14px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--mist);margin-bottom:5px}
.fld input,.fld select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;background:#fff;color:var(--ink)}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--tide)}
.btnrow{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:13px;border-radius:11px;border:none;font-size:15px;font-weight:700;cursor:pointer}
.btn.primary{background:var(--tide);color:#fff}
.btn.ghost{background:none;border:1.5px solid var(--line);color:var(--ink)}
.split-preview{font-size:13px;color:var(--kelp);font-weight:700;margin-top:-4px;margin-bottom:10px}

/* packing */
.pk{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-top:1px dashed var(--line);cursor:pointer}
.pk:first-child{border-top:none}
.pk .box{width:21px;height:21px;border:2px solid var(--mist);border-radius:6px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
.pk.done .box{background:var(--kelp);border-color:var(--kelp)}
.pk .txt{font-size:13.5px;line-height:1.35}
.pk.done .txt{color:var(--mist);text-decoration:line-through}
.pk .txt .n{display:block;font-size:11.5px;color:var(--mist);text-decoration:none}
.prog{font-size:12px;font-weight:700;color:var(--mist)}
.reset-link{display:block;text-align:center;margin:26px auto 8px;background:none;border:none;color:var(--mist);font-size:12px;text-decoration:underline;cursor:pointer}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--kelp);color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:700;z-index:99;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.loading{text-align:center;padding:50px 20px;color:var(--mist);font-size:14px}
</style>
</head>

let state = null;
let currentTab = "itin";

function defaultState(){
  return {expenses: JSON.parse(JSON.stringify(SEED_EXPENSES)), nextId: 22, packed: {}, openDays: {"Day 1":true}};
}

let memoryOnly = false;
async function loadState(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){ state = JSON.parse(raw); return; }
  }catch(e){ memoryOnly = true; }
  state = defaultState();
  saveState();
}

async function saveState(){
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }
  catch(e){
    if(!memoryOnly){ memoryOnly = true; toast("Saving unavailable \u2014 use Backup to keep your data"); }
  }
}

function exportData(){
  const data = JSON.stringify(state);
  const doneMsg = "Backup copied \u2014 paste it somewhere safe (Notes)";
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(data).then(()=>toast(doneMsg)).catch(()=>fallbackCopy(data, ()=>toast(doneMsg)));
  } else fallbackCopy(data, ()=>toast(doneMsg));
}

function importData(){
  const pasted = prompt("Paste your backup text here:");
  if(!pasted) return;
  try{
    const parsed = JSON.parse(pasted);
    if(!parsed.expenses || !Array.isArray(parsed.expenses)) throw new Error("bad");
    state = parsed;
    saveState(); render(); toast("Backup restored");
  }catch(e){ toast("That doesn't look like a valid backup"); }
}


function fmtTs(ts){
  if(!ts) return "";
  const d = new Date(ts);
  if(isNaN(d)) return "";
  return d.toLocaleDateString("en-CA",{month:"short",day:"numeric"}) + ", " +
         d.toLocaleTimeString("en-CA",{hour:"numeric",minute:"2-digit"});
}

function money(n){ return "$" + n.toLocaleString("en-CA",{minimumFractionDigits:2,maximumFractionDigits:2}); }

function toast(msg){
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 1800);
}

function switchTab(tab){
  currentTab = tab;
  ["itin","exp","pack","vlog","food"].forEach(x=>document.getElementById("tab-"+x).classList.toggle("active", x===tab));
  document.getElementById("fab").classList.toggle("hidden", tab!=="exp");
  render();
}

function render(){
  const app = document.getElementById("app");
  if(currentTab==="itin") app.innerHTML = renderItin();
  else if(currentTab==="exp") app.innerHTML = renderExp();
  else if(currentTab==="pack") app.innerHTML = renderPack();
  else if(currentTab==="food") app.innerHTML = renderFood();
  else app.innerHTML = renderVlog();
}

function renderItin(){
  return ITINERARY.map(d=>{
    const open = state.openDays[d.day] ? "open" : "";
    const badges = d.badges.map(b=>{
      if(b==="camp") return '<span class="badge camp">camping</span>';
      if(b==="long") return '<span class="badge long">long day</span>';
      return "";
    }).join("");
    const stops = d.stops.map(s=>{
      const addr = s.addr ? `<div class="addr"><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.addr)}" target="_blank" rel="noopener">\ud83d\udccd ${s.addr}</a><button onclick="event.stopPropagation();copyAddr('${s.addr.replace(/'/g,"\\'")}')" title="Copy address">\u29c9</button></div>` : "";
      return `<div class="stop"><div class="t">${s.t}</div><div class="a">${s.a}${s.n?`<span class="n">${s.n}</span>`:""}${addr}</div></div>`;
    }).join("");
    return `<div class="card ${open}">
      <div class="day-head" onclick="toggleDay('${d.day}')">
        <h2>${d.day} \u00b7 ${d.title}${badges}</h2>
        <span class="date">${d.date} <span class="chev">\u25b6</span></span>
      </div>
      <div class="day-body">${stops}</div>
    </div>`;
  }).join("");
}


function copyAddr(a){
  const done = ()=>toast("Address copied");
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(a).then(done).catch(()=>fallbackCopy(a, done));
  } else fallbackCopy(a, done);
}
function fallbackCopy(text, cb){
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); cb(); }catch(e){ toast("Couldn't copy"); }
  ta.remove();
}

function toggleDay(day){
  state.openDays[day] = !state.openDays[day];
  saveState(); render();
}

function renderExp(){
  const total = state.expenses.reduce((s,e)=>s+e.amt,0);
  const perPerson = total/5;
  // paid-by tally
  const paid = {};
  PEOPLE.forEach(p=>paid[p]=0);
  state.expenses.forEach(e=>{ if(paid[e.by]!==undefined) paid[e.by]+=e.amt; });
  const settle = PEOPLE.map(p=>{
    const diff = paid[p]-perPerson;
    if(Math.abs(diff)<0.01) return `<b>${p}</b>: settled`;
    return diff>0 ? `<b>${p}</b>: is owed ${money(diff)}` : `<b>${p}</b>: owes ${money(-diff)}`;
  }).join("<br>");

  let html = `<div class="totals">
    <div class="tot"><div class="lbl">Trip total</div><div class="val">${money(total)}</div></div>
    <div class="tot alt"><div class="lbl">Per person (\u00f75)</div><div class="val">${money(perPerson)}</div></div>
  </div>`;

  // Recent activity \u2014 newest first, chronological log
  const sorted = [...state.expenses].sort((a,b)=> (b.ts||"").localeCompare(a.ts||""));
  html += `<div class="section-title">Recent activity \u2014 newest first</div><div class="card">`;
  html += sorted.slice(0,12).map(e=>
    `<div class="exp-row"><div class="info"><div class="name">${e.name}</div><div class="meta">${e.by}${e.ts?" \u00b7 "+fmtTs(e.ts):""}</div></div><div class="amt">${money(e.amt)}</div></div>`
  ).join("");
  if(sorted.length>12) html += `<div class="meta" style="padding-top:8px;text-align:center">+ ${sorted.length-12} more below by category</div>`;
  html += `</div>`;

  CATS.forEach(cat=>{
    const items = state.expenses.filter(e=>e.cat===cat);
    if(!items.length) return;
    const sub = items.reduce((s,e)=>s+e.amt,0);
    html += `<div class="section-title">${cat}</div><div class="card">`;
    html += items.map(e=>
      `<div class="exp-row">
        <div class="info"><div class="name">${e.name}</div><div class="meta">${e.by}${e.note?" \u00b7 "+e.note:""}${e.ts?" \u00b7 "+fmtTs(e.ts):""}</div></div>
        <div class="amt">${money(e.amt)}<span class="pp">${money(e.amt/5)}/pp</span></div>
        <button class="del" onclick="delExpense(${e.id})">\u2715</button>
      </div>`).join("");
    html += `<div class="subtot"><span>Subtotal</span><span>${money(sub)}</span></div></div>`;
  });

  const paidRows = PEOPLE.map(p=>`<div class="exp-row"><div class="info"><div class="name">${p}</div></div><div class="amt">${money(paid[p])}</div></div>`).join("");
  html += `<div class="section-title">Total paid by person</div><div class="card">${paidRows}<div class="subtot"><span>Total</span><span>${money(total)}</span></div></div>`;
  html += `<div class="section-title">Settle-up (do this at the end of the trip)</div><div class="card settle">${settle}</div>`;
  html += `<div class="btnrow" style="margin-top:18px"><button class="btn ghost" onclick="exportData()">Backup data</button><button class="btn ghost" onclick="importData()">Restore backup</button></div>`;
  html += `<button class="reset-link" onclick="resetAll()">Reset all app data</button>`;
  return html;
}

function delExpense(id){
  const e = state.expenses.find(x=>x.id===id);
  if(!e) return;
  if(!confirm(`Delete "${e.name}" (${money(e.amt)})?`)) return;
  state.expenses = state.expenses.filter(x=>x.id!==id);
  saveState(); render(); toast("Expense deleted");
}

function openExpenseSheet(){
  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `<div class="sheet">
    <h3>Log an expense</h3>
    <div class="fld"><label>What was it?</label><input id="f-name" placeholder="e.g. Gas fill-up, Moncton groceries"></div>
    <div class="fld"><label>Amount (CAD)</label><input id="f-amt" type="number" inputmode="decimal" step="0.01" placeholder="0.00" oninput="previewSplit()"></div>
    <div class="split-preview" id="f-split"></div>
    <div class="fld"><label>Category</label><select id="f-cat">${CATS.map(c=>`<option>${c}</option>`).join("")}</select></div>
    <div class="fld"><label>Paid by</label><select id="f-by">${PEOPLE.map(p=>`<option>${p}</option>`).join("")}</select></div>
    <div class="fld"><label>Note (optional)</label><input id="f-note" placeholder="e.g. Jul 20, Irving station"></div>
    <div class="btnrow">
      <button class="btn ghost" onclick="this.closest('.overlay').remove()">Cancel</button>
      <button class="btn primary" onclick="addExpense()">Save expense</button>
    </div>
  </div>`;
  ov.addEventListener("click", e=>{ if(e.target===ov) ov.remove(); });
  document.body.appendChild(ov);
  setTimeout(()=>document.getElementById("f-name").focus(), 100);
}

function previewSplit(){
  const v = parseFloat(document.getElementById("f-amt").value);
  document.getElementById("f-split").textContent = (v>0)? `Splits to ${money(v/5)} per person` : "";
}

function addExpense(){
  const name = document.getElementById("f-name").value.trim();
  const amt = parseFloat(document.getElementById("f-amt").value);
  if(!name){ toast("Add a name for the expense"); return; }
  if(!(amt>0)){ toast("Enter a valid amount"); return; }
  state.expenses.push({
    id: state.nextId++,
    name,
    amt: Math.round(amt*100)/100,
    cat: document.getElementById("f-cat").value,
    by: document.getElementById("f-by").value,
    note: document.getElementById("f-note").value.trim(),
    ts: new Date().toISOString()
  });
  saveState();
  document.querySelector(".overlay").remove();
  render(); toast("Expense saved");
}

function renderVlog(){
  let html = `<div class="card vg"><b>Cinematic vlog plan</b> \u2014 matched to your locked itinerary. Check off must-film moments as you get them. Golden rule: LANDSCAPE, slow, 5\u201315s clips.</div>`;
  VLOG.forEach((d,di)=>{
    const open = state.openDays["vlog"+di] ? "open" : "";
    const shots = d.film.map((it,ii)=>{
      const k = "v"+di+"-"+ii;
      const done = state.vlogChecks && state.vlogChecks[k] ? "done":"";
      return `<div class="pk ${done}" onclick="toggleVlog('${k}')"><div class="box">${done?"\u2713":""}</div><div class="txt">${it}</div></div>`;
    }).join("");
    html += `<div class="card ${open}">
      <div class="day-head" onclick="toggleDay('vlog${di}')">
        <h2>${d.day}</h2><span class="date"><span class="chev">\u25b6</span></span>
      </div>
      <div class="day-body">
        <span class="vtag story">Story</span><div class="vg">${d.story}</div>
        <span class="vtag story">Must-film</span>${shots}
        <span class="vtag broll">B-roll</span><div class="vlist">${d.broll}</div>
        <span class="vtag talk">Talking clip</span><div class="vlist">${d.talk}</div>
        <span class="vtag talk">Script \u2014 say this on camera</span><div class="vlist" style="font-style:italic">${d.say}</div>
        <span class="vtag drone">Drone-style shot</span><div class="vlist">${d.drone}</div>
      </div></div>`;
  });
  html += `<div class="section-title">Always-On Rules</div>`;
  VLOG_RULES.forEach(r=>{
    html += `<div class="card"><div class="vg" style="margin-bottom:6px"><b>${r.h}</b></div>` +
      r.items.map(i=>`<div class="vlist">\u2022 ${i}</div>`).join("") + `</div>`;
  });
  return html;
}

function toggleVlog(k){
  if(!state.vlogChecks) state.vlogChecks = {};
  state.vlogChecks[k] = !state.vlogChecks[k];
  saveState(); render();
}

const GROCERY = [
 {stop:"\u2713 Costco haul \u2014 already bought (Jul 16)",note:"On hand for the trip. Meat plan: portion + marinate + vacuum-pack, freeze by end of Thursday \u2014 frozen packs double as ice packs and thaw one meal at a time; cook as needed.",
  items:["Water 500mL case","Pork belly \u00d72 + chicken thighs + breasts (FREEZE)","Eggs + milk","Bread, hot dog buns, tortillas \u00d72, Texas toast","Hoya ramen + trail mix + protein bars","Chips (Ruffles, Doritos) + sticky corn snacks","Apples, bananas, oranges","Tomatoes, mini cukes, romaine, sweet potato, asparagus, corn","Feta, OJ, marble cake","Salt + cooking spray"]},
 {stop:"Take from Kingston \u2014 dry goods (tomorrow)",note:"Confirm + check off tomorrow when packing.",
  items:["Rice / lentils (dal)","Spices kit (small containers)","Noodles","Cooking oil (small)","Tea / coffee + sugar","Condiment squeeze bottles"]},
 {stop:"Quebec City (Fri night / Sat morning)",note:"Mostly covered by Costco \u2014 top-up only.",
  items:["Fresh sandwich fillings if needed","Ice for cooler"]},
 {stop:"Moncton (Sat evening) \u2014 top-up shop",note:"Much smaller now. Fresh + camp-specific only.",
  items:["ICE for cooler","Marshmallows / campfire treats","Butter","Any fresh veg top-up","Propane check \u2014 spare if under 2 canisters","Foil, paper towel if not packed","Drinking water refill if low"]},
 {stop:"Neils Harbour (Tue morning)",note:"One thing only \u2014 but the best thing.",
  items:["Fresh scallops for tonight's dinner (ask what came in today)","Garlic if low"]},
 {stop:"Truro (Wed midday) \u2014 cottage restock",note:"Covers Thu at the cottage + Fri breakfast. Last big supermarket.",
  items:["Breakfast for 2 cottage mornings","Milk refill","Snacks + drinks top-up","Easy dinner backup for Wed late arrival","Anything running low"]}
]

function renderFood(){
  if(!state.mealPlan) state.mealPlan = JSON.parse(JSON.stringify(DEFAULT_MEALS));
  let html = `<div class="card vg"><b>Meal plan</b> \u2014 tap any meal to edit it. Your changes save automatically.</div>`;
  state.mealPlan.forEach((m,i)=>{
    html += `<div class="card">
      <div style="font-size:13px;font-weight:800;color:var(--ocean);margin-bottom:6px">${m.d}</div>
      <div class="stop"><div class="t">Breakfast</div><div class="a" onclick="editMeal(${i},'b')" style="color:var(--tide)">${m.b}</div></div>
      <div class="stop"><div class="t">Lunch</div><div class="a" onclick="editMeal(${i},'l')" style="color:var(--tide)">${m.l}</div></div>
      <div class="stop"><div class="t">Dinner</div><div class="a" onclick="editMeal(${i},'dn')" style="color:var(--tide)">${m.dn}</div></div>
    </div>`;
  });
  html += `<div class="section-title">Grocery \u2014 where to buy what</div>`;
  GROCERY.forEach((g,gi)=>{
    const removed = (state.removedGrocery && state.removedGrocery[gi]) || [];
    const extra = (state.customGrocery && state.customGrocery[gi]) || [];
    const defaults = g.items.map((it,ii)=>({it, k:"g"+gi+"-"+ii, custom:false, idx:ii}))
                            .filter(x=>!removed.includes(x.idx));
    const customs = extra.map((it,ci)=>({it, k:"gc"+gi+"-"+ci, custom:true, idx:ci}));
    const all = defaults.concat(customs);
    html += `<div class="card"><div style="font-size:13px;font-weight:800;color:var(--ocean)">${g.stop}</div>
      <div class="vg" style="color:var(--mist);margin:2px 0 6px">${g.note}</div>`;
    html += all.map(x=>{
      const done = state.groceryChecks && state.groceryChecks[x.k] ? "done":"";
      return `<div class="pk ${done}"><div class="box" onclick="toggleGroc('${x.k}')">${done?"\u2713":""}</div><div class="txt" onclick="toggleGroc('${x.k}')" style="flex:1">${x.it}</div><button class="del" onclick="removeGrocItem(${gi},${x.idx},${x.custom})" style="background:none;border:none;color:var(--mist);font-size:14px;padding:2px 4px">\u2715</button></div>`;
    }).join("");
    html += `<button class="btn ghost" style="margin-top:8px;padding:9px" onclick="addGrocItem(${gi})">+ Add item</button></div>`;
  });
  return html;
}

function editMeal(i, key){
  const labels = {b:"Breakfast",l:"Lunch",dn:"Dinner"};
  const cur = state.mealPlan[i][key];
  const v = prompt(labels[key] + " \u2014 " + state.mealPlan[i].d + ":", cur);
  if(v === null) return;
  state.mealPlan[i][key] = v.trim() || "\u2014";
  saveState(); render();
}

function toggleGroc(k){
  if(!state.groceryChecks) state.groceryChecks = {};
  state.groceryChecks[k] = !state.groceryChecks[k];
  saveState(); render();
}


function removeGrocItem(gi, idx, isCustom){
  if(!confirm("Remove this item from the list?")) return;
  if(isCustom){
    state.customGrocery[gi].splice(idx, 1);
  } else {
    if(!state.removedGrocery) state.removedGrocery = {};
    if(!state.removedGrocery[gi]) state.removedGrocery[gi] = [];
    state.removedGrocery[gi].push(idx);
  }
  saveState(); render(); toast("Item removed");
}

function addGrocItem(gi){
  const v = prompt("Add item to this shopping stop:");
  if(!v || !v.trim()) return;
  if(!state.customGrocery) state.customGrocery = {};
  if(!state.customGrocery[gi]) state.customGrocery[gi] = [];
  state.customGrocery[gi].push(v.trim());
  saveState(); render(); toast("Item added");
}

function renderPack(){
  let total=0, done=0;
  PACKING.forEach((s,si)=>s.items.forEach((_,ii)=>{ total++; if(state.packed[si+"-"+ii]) done++; }));
  let html = `<div class="card"><div class="prog">${done} of ${total} packed</div></div>`;
  PACKING.forEach((s,si)=>{
    html += `<div class="section-title">${s.sec}</div><div class="card">`;
    html += s.items.map((it,ii)=>{
      const k = si+"-"+ii;
      const d = state.packed[k] ? "done":"";
      return `<div class="pk ${d}" onclick="togglePack('${k}')"><div class="box">${state.packed[k]?"\u2713":""}</div><div class="txt">${it}</div></div>`;
    }).join("");
    html += `</div>`;
  });
  return html;
}

function togglePack(k){
  state.packed[k] = !state.packed[k];
  saveState(); render();
}

async function resetAll(){
  if(!confirm("Reset everything? This restores the original expenses and clears the packing checklist.")) return;
  state = defaultState();
  await saveState();
  render(); toast("App reset");
}

loadState().then(()=>{ render(); });

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(e => console.log("SW registration failed", e));
  });
}

</script>
</body>
</html>
